
x-airflow-env: &airflow_env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__WEBSERVER__SECRET_KEY: "a-consistent-secret-key-for-local-dev-only"
  GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/keys/dbt_service_account.json
  DBT_PROFILES_DIR: /opt/airflow/dbt
  PG_HOST: host.docker.internal

x-airflow-volumes: &airflow_volumes
  - ./airflow/dags:/opt/airflow/dags
  - ./dbt:/opt/airflow/dbt
  - ./keys:/opt/airflow/keys
  - ./extract_to_bronze.py:/opt/airflow/extract_to_bronze.py
  - ./.env:/opt/airflow/.env

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow-init:
    build: ./airflow
    depends_on:
      - postgres
    environment: *airflow_env
    volumes: *airflow_volumes
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"

  airflow-webserver:
    build: ./airflow
    depends_on:
      - airflow-init
    environment: *airflow_env
    volumes: *airflow_volumes
    ports:
      - "8080:8080"
    command: airflow webserver

  airflow-scheduler:
    build: ./airflow
    depends_on:
      - airflow-init
    environment: *airflow_env
    volumes: *airflow_volumes
    command: airflow scheduler

volumes:
  postgres_data: